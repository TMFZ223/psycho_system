version: "3.9"

services:

  db:
    image: postgres:17
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: work_polygon_base
      POSTGRES_USER: test_admin
      POSTGRES_PASSWORD: test_password_1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_admin -d work_polygon_base"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./back

    container_name: fastapi_app

    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://test_admin:test_password_1234@db:5432/work_polygon_base

    volumes:
      - ./back:/app

  frontend:
    build:
      context: ./front

    container_name: nextjs_frontend

    restart: always

    depends_on:
      - api

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    volumes:
      - ./front:/app
      - /app/node_modules

volumes:
  postgres_data:
    driver: local